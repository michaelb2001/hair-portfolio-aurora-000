<section class="booking">

    <h1>Prenota il tuo appuntamento</h1>

    <div class="calendar">

        <label>
            Seleziona giorno
        </label>

        <input type="date" (change)="selectDate($event)" />

    </div>


    <div class="times">

        <h2>Scegli orario</h2>

        <button *ngFor="let time of availableTimes" type="button" (click)="selectTime(time)"
            [disabled]="!isTimeAvailable(time)" [class.active]="selectedTime === time">
            {{ time }}
        </button>

    </div>


    <div class="form">

        <input placeholder="Nome" [(ngModel)]="name" />


        <input placeholder="Email" [(ngModel)]="email" />


        <input placeholder="Telefono" [(ngModel)]="phone" />


        <button type="button" (click)="submitAppointment()">
            Richiedi appuntamento
        </button>

    </div>


</section>
